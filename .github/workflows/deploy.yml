name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment variables
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

# Required GitHub secrets:
#   VERCEL_TOKEN      — from vercel.com/account/tokens
#   VERCEL_ORG_ID     — from vercel.com/<team>/settings (or personal account settings)
#   VERCEL_PROJECT_ID — from vercel.com/<team>/<project>/settings
#
# Required Vercel environment variable (set in Vercel project settings, not GitHub):
#   ANTHROPIC_API_KEY — your Anthropic API key (server-side only, never exposed to client)
